<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>حياء — سجل الأحداث</title>
  <style>
    :root {
      --gradient: linear-gradient(135deg, #6C9FE8, #B47FDA);
      --bg: #07071a;
      --bg-card: rgba(18, 18, 58, 0.6);
      --bg-input: rgba(12, 12, 40, 0.8);
      --text: #f0f0ff;
      --text-muted: #8888bb;
      --border: rgba(108, 159, 232, 0.12);
      --border-glow: rgba(180, 127, 218, 0.25);
      --glow-blue: rgba(108, 159, 232, 0.35);
      --danger: #ef4444;
      --success: #10b981;
      --glass-blur: blur(12px);
      --glass-inner: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    body.light {
      --bg: #f0f2f8;
      --bg-card: rgba(255, 255, 255, 0.75);
      --bg-input: rgba(240, 242, 248, 0.9);
      --text: #1a1a2e;
      --text-muted: #6b7290;
      --border: rgba(108, 159, 232, 0.18);
      --border-glow: rgba(180, 127, 218, 0.3);
      --glow-blue: rgba(108, 159, 232, 0.2);
      --glass-inner: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      min-height: 100vh;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid;
      border-image: var(--gradient) 1;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      box-shadow: 0 4px 16px var(--glow-blue);
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: 0.3s;
      font-family: inherit;
      font-weight: 600;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      border-image: var(--gradient) 1;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .event-list {
      list-style: none;
      max-height: 500px;
      overflow-y: auto;
      -webkit-mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
    }

    .event-list::-webkit-scrollbar { width: 4px; }
    .event-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .event-item {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: all 0.3s ease;
      box-shadow: var(--glass-inner);
    }

    .event-item:hover {
      border-color: var(--border-glow);
      box-shadow: var(--glass-inner), 0 0 14px var(--glow-blue);
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .event-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .badge-report {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .badge-filter {
      background: rgba(108, 159, 232, 0.15);
      color: #6C9FE8;
    }

    .badge-dict {
      background: rgba(180, 127, 218, 0.15);
      color: #B47FDA;
    }

    .event-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .event-text {
      font-size: 13px;
      color: var(--text);
      filter: blur(4px);
      transition: filter 0.2s;
      cursor: pointer;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .event-text:hover { filter: none; }

    .event-domain {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      direction: ltr;
      text-align: right;
    }

    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
    }

    .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }

    .clear-btn {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 16px;
    }

    .clear-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: var(--danger);
    }

    .stats-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stats-summary .stat-box {
      flex: 1;
      text-align: center;
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      box-shadow: var(--glass-inner);
    }

    .stat-box .num {
      display: block;
      font-size: 28px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat-box .lbl {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Parental PIN gate — mirrors the options page, since the log can be
       opened directly and exposes filtered/reported text. */
    .page-lock {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .page-lock-box {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px;
      text-align: center;
      width: min(340px, 90vw);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    .page-lock-box .lock-logo { width: 48px; height: 48px; margin-bottom: 14px; }
    .page-lock-box h2 { font-size: 19px; margin-bottom: 6px; }
    .page-lock-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .page-lock-box .pin-input {
      width: 100%;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 5px;
      margin-bottom: 14px;
      outline: none;
    }
    .page-lock-box .pin-input:focus { border-color: var(--border-glow); }
    .page-lock-box .pin-submit-btn {
      width: 100%;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .page-lock-box .error-msg {
      display: block;
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <!-- Parental PIN gate — blocks the whole log until the PIN is entered -->
  <div class="page-lock" id="pageLock" style="display:none">
    <div class="page-lock-box">
      <img src="icons/icon48.png" alt="Hayā" class="lock-logo">
      <h2>السجل محمي</h2>
      <p>أدخل رمز PIN للاطلاع على السجل</p>
      <input type="password" id="pageLockInput" class="pin-input" maxlength="4" inputmode="numeric" dir="ltr" placeholder="PIN">
      <button id="pageLockBtn" class="pin-submit-btn">فتح</button>
      <span id="pageLockMsg" class="error-msg"></span>
    </div>
  </div>

  <div class="container" id="logContent" style="display:none">
    <header>
      <img src="icons/icon48.png" alt="Hayā" class="logo">
      <h1>سجل الأحداث</h1>
    </header>

    <div class="stats-summary">
      <div class="stat-box">
        <span class="num" id="totalCount">0</span>
        <span class="lbl">إجمالي الفلترة</span>
      </div>
      <div class="stat-box">
        <span class="num" id="reportCount">0</span>
        <span class="lbl">بلاغات</span>
      </div>
      <div class="stat-box">
        <span class="num" id="pagesCount">0</span>
        <span class="lbl">صفحات</span>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="reports">البلاغات</button>
      <button class="tab" data-tab="activity">النشاط</button>
    </nav>

    <div class="tab-content active" id="tab-reports">
      <ul class="event-list" id="reportList"></ul>
    </div>

    <div class="tab-content" id="tab-activity">
      <ul class="event-list" id="activityList"></ul>
    </div>
  </div>

  <script src="notifications.js"></script>
</body>
</html>
