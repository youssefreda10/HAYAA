<!DOCTYPE html>

<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", Tahoma, sans-serif; background: #0c0c2e; color: #fff; padding: 24px; direction: ltr; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .summary { margin-bottom: 20px; font-size: 15px; color: #a0a0c0; }
    .summary b { color: #fff; }
    .summary .pass { color: #10b981; } .summary .fail { color: #ef4444; }
    .category { margin-top: 28px; margin-bottom: 8px; }
    .category h2 { font-size: 17px; color: #3b82f6; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; display: flex; justify-content: space-between; }
    .category h2 .score { font-size: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 4px; }
    th { text-align: left; background: #12123a; padding: 6px 10px; color: #a0a0c0; font-weight: 600; }
    td { padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .pass-row td { background: rgba(16,185,129,0.06); }
    .fail-row td { background: rgba(239,68,68,0.08); }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    .b-pass { background: rgba(16,185,129,0.2); color: #10b981; }
    .b-fail { background: rgba(239,68,68,0.2); color: #ef4444; }
    .b-dict { background: rgba(168,85,247,0.15); color: #a855f7; }
    .b-miss { background: rgba(239,68,68,0.15); color: #ef4444; }
    .arabic { direction: rtl; font-family: "Segoe UI", Tahoma, "Arial", sans-serif; }
    .gap-section { margin-top: 32px; background: #12123a; padding: 20px; border-radius: 10px; }
    .gap-section h2 { color: #ef4444; margin-bottom: 12px; }
    .gap-list { list-style: none; }
    .gap-list li { padding: 4px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .gap-list .cat { color: #3b82f6; font-weight: 600; min-width: 180px; display: inline-block; }
    .filter-bar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: #12123a; color: #a0a0c0; border: 1px solid rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  </style>
</head>

        var r = test(tc.input);
        var passed = r.matched === tc.expect;

        if (passed) { catPass++; totalPass++; }
        else { catFail++; totalFail++; gaps.push({ cat: cat, input: tc.input, desc: tc.desc, expected: tc.expect, got: r.matched, normalized: r.normalized }); }

        totalTests++;
        results[cat].push({ input: tc.input, desc: tc.desc, expected: tc.expect, got: r.matched, normalized: r.normalized, passed: passed });
      }

      results[cat].pass = catPass;
      results[cat].fail = catFail;
      results[cat].total = cases.length;
    }

    // ═══════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════

    var passRate = totalTests > 0 ? Math.round(totalPass / totalTests * 100) : 0;
    document.getElementById("summary").innerHTML =
      "Total: <b>" + totalTests + "</b> tests — " +
      '<span class="pass">✓ ' + totalPass + " passed</span> — " +
      '<span class="fail">✗ ' + totalFail + " failed</span> — " +
      "Pass rate: <b>" + passRate + "%</b>";

    var filterBar = document.getElementById("filterBar");
    var allBtn = document.createElement("button");
    allBtn.className = "filter-btn active";
    allBtn.textContent = "All (" + totalTests + ")";
    allBtn.onclick = function () { filterResults("all"); };
    filterBar.appendChild(allBtn);

    var failBtn = document.createElement("button");
    failBtn.className = "filter-btn";
    failBtn.textContent = "Failed Only (" + totalFail + ")";
    failBtn.onclick = function () { filterResults("fail"); };
    filterBar.appendChild(failBtn);

    var passBtn = document.createElement("button");
    passBtn.className = "filter-btn";
    passBtn.textContent = "Passed Only (" + totalPass + ")";
    passBtn.onclick = function () { filterResults("pass"); };
    filterBar.appendChild(passBtn);

    var container = document.getElementById("results");

    for (var cat in results) {
      var items = results[cat];
      var div = document.createElement("div");
      div.className = "category";
      div.dataset.cat = cat;

      var scoreColor = items.fail > 0 ? "#ef4444" : "#10b981";
      var pct = Math.round(items.pass / items.total * 100);
      div.innerHTML = '<h2>' + cat + ' <span class="score" style="color:' + scoreColor + '">' + items.pass + '/' + items.total + ' (' + pct + '%)</span></h2>';

      var table = '<table><tr><th>#</th><th>Input</th><th>Description</th><th>Normalized</th><th>Expected</th><th>Got</th><th>Result</th></tr>';
      for (var j = 0; j < items.length; j++) {
        var r = items[j];
        var rowClass = r.passed ? "pass-row" : "fail-row";
        var badge = r.passed ? '<span class="badge b-pass">PASS</span>' : '<span class="badge b-fail">FAIL</span>';
        var expLabel = r.expected ? "TOXIC" : "SAFE";
        var gotLabel = r.got ? "TOXIC" : "SAFE";
        table += '<tr class="' + rowClass + '" data-status="' + (r.passed ? "pass" : "fail") + '"><td>' + (j + 1) + '</td><td class="arabic">' + escHtml(r.input) + '</td><td>' + r.desc + '</td><td class="arabic">' + escHtml(r.normalized) + '</td><td>' + expLabel + '</td><td>' + gotLabel + '</td><td>' + badge + '</td></tr>';
      }
      table += '</table>';
      div.innerHTML += table;
      container.appendChild(div);
    }

    // Gap analysis
    if (gaps.length > 0) {
      var gapSection = document.getElementById("gapSection");
      gapSection.style.display = "block";
      var gapList = document.getElementById("gapList");

      for (var g = 0; g < gaps.length; g++) {
        var gap = gaps[g];
        var label = gap.expected ? "MISSED (should catch)" : "FALSE POSITIVE (should skip)";
        var li = document.createElement("li");
        li.innerHTML = '<span class="cat">' + gap.cat + '</span> ' +
          '<span class="arabic">' + escHtml(gap.input) + '</span> — ' +
          gap.desc + ' — <span class="badge b-fail">' + label + '</span>';
        gapList.appendChild(li);
      }
    }

    function filterResults(mode) {
      document.querySelectorAll(".filter-btn").forEach(function (b) { b.classList.remove("active"); });
      event.target.classList.add("active");

      document.querySelectorAll("table tr[data-status]").forEach(function (row) {
        if (mode === "all") row.style.display = "";
        else if (mode === "fail") row.style.display = row.dataset.status === "fail" ? "" : "none";
        else row.style.display = row.dataset.status === "pass" ? "" : "none";
      });
    }

    function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
