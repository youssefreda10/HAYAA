<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>حياء — الإعدادات</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon48.png" alt="Hayā" class="logo">
      <h1>إعدادات حيـاء</h1>
      <button class="theme-btn" id="themeToggle" title="تبديل السمة">
        <svg class="theme-icon" id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="general">عام</button>
      <button class="tab" data-tab="words">القاموس</button>
      <button class="tab" data-tab="allowlist">القائمة البيضاء</button>
      <button class="tab" data-tab="domains">المواقع</button>
    </nav>

    <!-- عام -->
    <section id="tab-general" class="tab-content active">
      <div class="glass-card toggle-row">
        <span>تفعيل الإضافة</span>
        <label class="switch">
          <input type="checkbox" id="optEnabled" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="glass-card">
        <div class="field" style="margin-bottom:0">
          <label>وضع الفلتر</label>
          <select id="optMode">
            <option value="blur">تمويه</option>
            <option value="hide">إخفاء</option>
            <option value="highlight">تمييز</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px">
        <button id="saveGeneral" class="btn-primary">حفظ</button>
        <span id="generalSaved" class="saved-msg"></span>
      </div>

      <div class="lock-section" style="margin-top:20px">
        <div id="optLockActiveView" style="display:none">
          <div class="lock-status">
            <svg class="lock-icon" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span id="optLockText">وضع حماية الأطفال مفعّل</span>
          </div>
          <div class="lock-actions">
            <button id="optLockBtn" class="lock-btn">قفل الكشف</button>
            <button id="optRemovePwBtn" class="lock-btn lock-btn-danger">إزالة PIN</button>
          </div>
          <div id="optRemovePwForm" style="display:none;margin-top:10px">
            <div class="lock-setup-row">
              <input type="password" id="optRemovePwInput" maxlength="4" inputmode="numeric" placeholder="أدخل PIN الحالي">
              <button id="optRemovePwConfirm" class="lock-btn-set">تأكيد الإزالة</button>
            </div>
            <span id="optRemovePwMsg" class="error-msg"></span>
          </div>
        </div>
        <div id="optLockSetupView">
          <span class="lock-setup-label">وضع حماية الأطفال — رمز PIN (4 أرقام)</span>
          <div class="lock-setup-row">
            <input type="password" id="optNewRevealPw" maxlength="4" inputmode="numeric" placeholder="4 أرقام...">
            <button id="optSetRevealPwBtn" class="lock-btn-set">تعيين</button>
          </div>
          <span id="optSetPwMsg" class="error-msg"></span>
        </div>
      </div>
    </section>

    <!-- التصدير والاستيراد والمشاركة -->
    <section class="export-import-section">
      <div class="config-buttons">
        <button id="exportBtn" class="btn-secondary">تصدير</button>
        <label class="btn-secondary import-label">
          استيراد
          <input type="file" id="importFile" accept=".json" hidden>
        </label>
        <button id="shareListBtn" class="btn-secondary">مشاركة القوائم</button>
        <button id="importShareBtn" class="btn-secondary">استيراد رمز</button>
      </div>
      <span id="configMsg" class="saved-msg"></span>
    </section>

    <!-- القاموس -->
    <section id="tab-words" class="tab-content">
      <p class="hint">أضف كلمات مخصصة للفلتر</p>
      <div class="add-row">
        <input type="text" id="newWord" placeholder="اكتب كلمة...">
        <button id="addWord" class="btn-primary">إضافة</button>
      </div>
      <ul id="wordList" class="word-list"></ul>
    </section>

    <!-- القائمة البيضاء -->
    <section id="tab-allowlist" class="tab-content">
      <p class="hint">كلمات لن يتم فلترتها أبداً</p>
      <div class="add-row">
        <input type="text" id="newAllow" placeholder="اكتب كلمة...">
        <button id="addAllow" class="btn-primary">إضافة</button>
      </div>
      <ul id="allowList" class="word-list"></ul>
    </section>

    <!-- المواقع -->
    <section id="tab-domains" class="tab-content">
      <div class="glass-card">
        <div class="field" style="margin-bottom:0">
          <label>وضع المواقع</label>
          <select id="domainModeSelect">
            <option value="normal">عادي — فلتر في كل مكان</option>
            <option value="minimal">محدود — مواقع محددة فقط</option>
          </select>
        </div>
      </div>

      <div id="normalModeSection">
        <p class="hint">المواقع المعطّل عليها الفلتر</p>
        <div class="add-row">
          <input type="text" id="newDomain" placeholder="example.com" dir="ltr">
          <button id="addDomain" class="btn-primary">إضافة</button>
        </div>
        <ul id="domainList" class="word-list"></ul>
      </div>

      <div id="minimalModeSection" style="display:none">
        <p class="hint">المواقع المفعّل عليها الفلتر فقط</p>
        <div class="add-row">
          <input type="text" id="newEnabledDomain" placeholder="example.com" dir="ltr">
          <button id="addEnabledDomain" class="btn-primary">إضافة</button>
        </div>
        <ul id="enabledDomainList" class="word-list"></ul>
      </div>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
