<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../icons/icon48.png" alt="Hayā" class="logo">
      <span class="separator">|</span>
      <h1>حيـاء</h1>
    </div>

    <div class="toggle-row">
      <span>تفعيل الإضافة</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="mode-row">
      <label>وضع الفلتر:</label>
      <select id="modeSelect">
        <option value="blur">تمويه</option>
        <option value="hide">إخفاء</option>
        <option value="highlight">تمييز</option>
      </select>
    </div>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-number" id="pageCount">0</span>
        <span class="stat-label">في هذه الصفحة</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">الإجمالي</span>
      </div>
    </div>

    <div class="summary-section" id="summarySection" style="display:none">
      <label class="summary-label">النصوص المفلترة (مرر للكشف):</label>
      <ul class="summary-list" id="summaryList"></ul>
    </div>

    <!-- API key input removed as Modal backend handles authentication -->

    <div class="threshold-row">
      <label>حساسية الكشف: <span id="thresholdValue">75%</span></label>
      <input type="range" id="thresholdSlider" min="50" max="95" value="75">
    </div>

    <div class="footer">
      <a href="#" id="openOptions">الإعدادات المتقدمة</a>
      <span>Hayā v1.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
