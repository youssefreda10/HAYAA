<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Loading skeleton -->
    <div id="skeleton" class="skeleton-wrap">
      <div class="skeleton-header">
        <div class="skeleton-box" style="width:38px;height:38px;border-radius:10px"></div>
        <div class="skeleton-box" style="width:120px;height:22px;border-radius:6px"></div>
      </div>
      <div class="skeleton-box skeleton-card"></div>
      <div class="skeleton-box skeleton-card"></div>
      <div class="skeleton-box skeleton-card" style="height:70px"></div>
    </div>

    <!-- Main content (hidden until loaded) -->
    <div id="mainContent" style="display:none">
    <div class="header">
      <img src="../icons/icon48.png" alt="Hayā" class="logo">
      <h1>حيـاء</h1>
      <button class="theme-btn" id="themeToggle" title="تبديل السمة">
        <svg class="theme-icon" id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <!-- Controls (disabled when parental lock is active) -->
    <div class="glass-card toggle-row" id="toggleCard">
      <span>تفعيل على هذا الموقع</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="glass-card mode-row" id="modeCard">
      <label>وضع الفلتر</label>
      <select id="modeSelect">
        <option value="blur">تمويه</option>
        <option value="hide">إخفاء</option>
        <option value="highlight">تمييز</option>
      </select>
    </div>

    <!-- Parental Lock Section -->
    <div class="glass-card" id="lockSection">
      <!-- PIN is set: show lock controls -->
      <div id="lockActiveView" style="display:none">
        <div class="lock-status">
          <svg class="lock-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span id="lockText">وضع حماية الأطفال مفعّل</span>
        </div>
        <div class="lock-actions">
          <button id="lockBtn" class="lock-btn">قفل الكشف</button>
          <button id="removePinBtn" class="lock-btn lock-btn-danger">إزالة PIN</button>
        </div>
        <div id="removePinForm" style="display:none;margin-top:10px">
          <div class="lock-setup-row">
            <input type="password" id="removePinInput" maxlength="4" inputmode="numeric" dir="ltr" placeholder="PIN">
            <button id="removePinConfirm" class="lock-btn-set">تأكيد</button>
          </div>
          <span id="removePinMsg" class="lock-error"></span>
        </div>
      </div>
      <!-- No PIN: show setup -->
      <div id="lockSetupView">
        <span class="lock-setup-label">وضع حماية الأطفال — رمز PIN (4 أرقام)</span>
        <div class="lock-setup-row">
          <input type="password" id="newPin" maxlength="4" inputmode="numeric" dir="ltr" placeholder="PIN">
          <button id="setPinBtn" class="lock-btn-set">تعيين</button>
        </div>
        <span id="setPinMsg" class="lock-error"></span>
      </div>
    </div>

    <!-- Locked overlay (covers controls when PIN is set but not entered) -->
    <div class="locked-overlay" id="lockedOverlay" style="display:none">
      <svg class="lock-icon-big" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="locked-label">الإعدادات محمية برمز PIN</span>
      <input type="password" id="unlockPinInput" class="pin-input" maxlength="4" inputmode="numeric" placeholder="PIN">
      <button id="unlockPinBtn" class="pin-submit-btn">فتح</button>
      <span id="unlockPinMsg" class="lock-error"></span>
    </div>

    <!-- Achievement -->
    <div class="glass-card achievement-card" id="achievementCard" style="display:none">
      <div class="achievement-row">
        <span class="achievement-icon" id="achievementIcon"></span>
        <div class="achievement-info">
          <span class="achievement-title" id="achievementTitle"></span>
          <span class="achievement-desc" id="achievementDesc"></span>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="openOptions">الإعدادات</a>
      <a href="#" id="openNotifications" class="notif-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        السجل
      </a>
      <span class="version">v1.0.0</span>
    </div>
    </div> <!-- end mainContent -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
